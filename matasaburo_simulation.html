<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>又三郎の台所 — 損益シミュレーター</title>
<style>
  :root{--ink:#1A1A1A;--cream:#F7F3EC;--paper:#FFFFFF;--teal:#0D7377;--teal-lt:#E0F0F0;--gold:#C49A3C;--gold-lt:#FBF3E0;--red:#C0392B;--red-lt:#FFF0EF;--green:#1E6B4A;--green-lt:#E8F5EE;--gray:#64748B;--gray-lt:#F1F5F9;--border:#E2E0D8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;}
  header{background:var(--ink);padding:18px 20px 14px;display:flex;align-items:baseline;gap:12px;}
  header h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:.05em;}
  header span{font-size:12px;color:#888;letter-spacing:.08em;}
  .fixed-bar{background:var(--teal);padding:8px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .fixed-bar label{font-size:12px;color:#B8E0E0;margin-right:3px;}
  .fixed-bar input[type=number],.fixed-bar select{width:auto;padding:3px 6px;border:1px solid rgba(255,255,255,.3);border-radius:4px;background:rgba(255,255,255,.15);color:#fff;font-size:13px;font-family:inherit;}
  .fixed-bar select option{background:#0D7377;color:#fff;}
  .fixed-bar input:focus,.fixed-bar select:focus{outline:2px solid rgba(255,255,255,.5);}
  .fixed-total{margin-left:auto;font-size:13px;color:#fff;white-space:nowrap;}
  .fixed-total strong{font-size:15px;}
  main{padding:16px 20px;max-width:1080px;margin:0 auto;display:grid;grid-template-columns:1fr 320px;gap:16px;}
  .menu-section h2{font-size:12px;font-weight:600;color:var(--gray);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;}
  .daily-badge{font-size:12px;background:#EFF6FF;color:#185FA5;padding:4px 12px;border-radius:20px;font-weight:600;margin-bottom:10px;display:inline-block;}
  .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;margin-bottom:12px;}
  .menu-card{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:14px;transition:box-shadow .15s;}
  .menu-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08);}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .card-name-input{border:none;background:transparent;font-size:14px;font-weight:700;color:var(--ink);width:calc(100% - 90px);font-family:inherit;}
  .card-name-input:focus{outline:none;border-bottom:2px solid var(--teal);}
  .card-badge{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;}
  .card-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .input-group label{display:block;font-size:11px;color:var(--gray);margin-bottom:3px;}
  .input-row{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;background:var(--gray-lt);}
  .input-row:focus-within{border-color:var(--teal);background:#fff;}
  .input-row span{padding:0 6px;font-size:12px;color:var(--gray);user-select:none;}
  .input-row input[type=number]{width:100%;padding:5px 4px;border:none;background:transparent;font-size:14px;font-family:inherit;color:var(--ink);-moz-appearance:textfield;}
  .input-row input[type=number]::-webkit-outer-spin-button,.input-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  .input-row input:focus{outline:none;}
  .card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
  .stat{background:var(--gray-lt);border-radius:5px;padding:5px 6px;text-align:center;}
  .stat .lbl{color:var(--gray);font-size:10px;margin-bottom:1px;}
  .stat .val{font-weight:700;font-size:13px;}
  .qty-row{display:flex;align-items:center;gap:8px;margin-top:8px;border-top:1px solid var(--border);padding-top:8px;}
  .qty-row label{font-size:11px;color:var(--gray);white-space:nowrap;}
  .qty-row input[type=range]{flex:1;accent-color:var(--teal);height:3px;cursor:pointer;}
  .qty-val{font-size:12px;font-weight:700;min-width:90px;text-align:right;color:var(--teal);}
  .del-btn{background:none;border:none;color:#ccc;font-size:15px;cursor:pointer;padding:0 2px;line-height:1;}
  .del-btn:hover{color:var(--red);}
  /* サマリー */
  .summary-panel{position:sticky;top:16px;height:fit-content;}
  .summary-card{background:var(--paper);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .summary-head{background:var(--ink);padding:12px 16px;color:#fff;font-size:13px;font-weight:700;letter-spacing:.04em;}
  .summary-body{padding:14px 16px;}
  .sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .sum-row .lbl{color:var(--gray);}
  .sum-row .val{font-weight:600;font-size:14px;}
  .profit-block{margin:12px 0 0;border-radius:8px;padding:12px;text-align:center;}
  .profit-block .p-label{font-size:10px;margin-bottom:3px;font-weight:600;letter-spacing:.06em;}
  .profit-block .p-val{font-size:28px;font-weight:700;}
  .profit-block .p-rate{font-size:12px;margin-top:2px;}
  .bep-block{margin-top:10px;background:var(--gold-lt);border:1px solid #E8D5A0;border-radius:8px;padding:10px 12px;}
  .bep-block .bep-title{color:var(--gold);font-weight:700;margin-bottom:3px;font-size:10px;letter-spacing:.05em;}
  .bep-block .bep-val{font-size:16px;font-weight:700;color:var(--ink);}
  .bep-block .bep-sub{color:var(--gray);font-size:11px;margin-top:2px;}
  .target-row{display:flex;align-items:center;gap:6px;margin:10px 0 0;padding:8px 12px;background:var(--gray-lt);border-radius:8px;font-size:12px;flex-wrap:wrap;}
  .target-row label{color:var(--gray);}
  .target-row input[type=number]{width:88px;padding:3px 6px;border:1.5px solid var(--border);border-radius:5px;font-size:13px;font-family:inherit;background:#fff;}
  .target-diff{font-weight:700;margin-left:auto;font-size:12px;}
  .contrib-table{margin-top:12px;width:100%;border-collapse:collapse;font-size:11px;}
  .contrib-table th{text-align:left;color:var(--gray);padding:3px 4px;border-bottom:1px solid var(--border);font-weight:500;}
  .contrib-table td{padding:4px;border-bottom:1px solid var(--border);}
  .contrib-table tr:last-child td{border-bottom:none;}
  .bar-bg{background:var(--gray-lt);border-radius:3px;height:5px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .3s;}
  .add-btn{width:100%;padding:10px;background:transparent;border:2px dashed var(--border);border-radius:10px;color:var(--gray);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;}
  .add-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt);}
  .reset-btn{background:none;border:none;color:var(--gray);font-size:11px;cursor:pointer;text-decoration:underline;padding:4px 0;font-family:inherit;}
  .reset-btn:hover{color:var(--red);}
  @media(max-width:700px){main{grid-template-columns:1fr;}.summary-panel{position:static;}}
</style>
</head>
<body>

<header>
  <h1>又三郎の台所</h1>
  <span>損益シミュレーター</span>
</header>

<div class="fixed-bar">
  <div>
    <label>営業日数</label>
    <select id="days-select" onchange="onDaysChange()">
      <option value="21.4" selected>週5日（月21.4日）</option>
      <option value="25.7">週6日（月25.7日）</option>
      <option value="17.1">週4日（月17.1日）</option>
      <option value="26">月26日固定</option>
    </select>
  </div>
  <div><label>家賃</label><input type="number" id="fix-rent"  value="92171"  step="1000">円</div>
  <div><label>光熱費</label><input type="number" id="fix-util"  value="35000"  step="1000">円</div>
  <div><label>人件費</label><input type="number" id="fix-labor" value="250000" step="10000">円</div>
  <div class="fixed-total">固定費合計 <strong id="fix-total">377,171</strong> 円/月</div>
</div>

<main>
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <h2>メニュー設定</h2>
      <button class="reset-btn" onclick="resetAll()">初期値に戻す</button>
    </div>
    <div class="daily-badge" id="daily-badge">読み込み中...</div>
    <div class="menu-grid" id="menu-grid"></div>
    <button class="add-btn" onclick="addMenu()">＋ メニューを追加</button>
  </div>

  <div class="summary-panel">
    <div class="summary-card">
      <div class="summary-head">損益サマリー（月次）</div>
      <div class="summary-body">
        <div class="sum-row"><span class="lbl">営業日数</span><span class="val" id="s-days">—</span></div>
        <div class="sum-row"><span class="lbl">売上合計</span><span class="val" id="s-sales">—</span></div>
        <div class="sum-row"><span class="lbl">原価合計</span><span class="val" id="s-cogs">—</span></div>
        <div class="sum-row"><span class="lbl">粗利 / 粗利率</span><span class="val" id="s-gross">—</span></div>
        <div class="sum-row"><span class="lbl">固定費</span><span class="val" id="s-fixed">—</span></div>
        <div class="profit-block" id="profit-block">
          <div class="p-label">営 業 利 益</div>
          <div class="p-val" id="s-profit">—</div>
          <div class="p-rate" id="s-prate">—</div>
        </div>
        <div class="bep-block">
          <div class="bep-title">損益分岐点</div>
          <div class="bep-val" id="s-bep">—</div>
          <div class="bep-sub" id="s-bep-sub">—</div>
        </div>
        <div class="target-row">
          <label>月商目標</label>
          <input type="number" id="target-sales" value="857143" step="10000">
          <label>円</label>
          <span class="target-diff" id="target-diff">—</span>
        </div>
        <div style="margin-top:12px;font-size:11px;color:var(--gray);font-weight:600;letter-spacing:.04em;">メニュー別 粗利貢献</div>
        <table class="contrib-table" id="contrib-table"></table>
      </div>
    </div>
  </div>
</main>

<script>
const DEFAULT_MENUS = [
  {id:1, name:'たまごサンド',     price:850,  cost:250, qty:202},
  {id:2, name:'極上たまごサンド', price:1200, cost:350, qty:107},
  {id:3, name:'水出しコーヒー',   price:600,  cost:90,  qty:357},
  {id:4, name:'ホットコーヒー',   price:500,  cost:90,  qty:343},
  {id:5, name:'スープ',          price:300,  cost:50,  qty:429},
  {id:6, name:'気まぐれ親子丼',  price:1200, cost:500, qty:107},
];

let menus = JSON.parse(JSON.stringify(DEFAULT_MENUS));
let nextId = 10;
let DAYS = 21.4;

const fmt = n => Math.round(n).toLocaleString('ja-JP');

function getDays(){ return parseFloat(document.getElementById('days-select').value)||21.4; }
function getFixed(){
  return (+document.getElementById('fix-rent').value||0)
       + (+document.getElementById('fix-util').value||0)
       + (+document.getElementById('fix-labor').value||0);
}
function onDaysChange(){
  DAYS = getDays();
  document.getElementById('target-sales').value = Math.round(40000*DAYS);
  renderCards(); recalc();
}
['fix-rent','fix-util','fix-labor'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{ recalc(); });
});

function renderCards(){
  const grid = document.getElementById('menu-grid');
  grid.innerHTML = '';
  menus.forEach(m=>{
    const mg = m.price - m.cost;
    const mr = m.price > 0 ? mg/m.price*100 : 0;
    const bg = mr>=65?'#E8F5EE':mr>=45?'#FBF3E0':'#FFF0EF';
    const tc = mr>=65?'#1E6B4A':mr>=45?'#C49A3C':'#C0392B';
    const dq = DAYS > 0 ? (m.qty/DAYS).toFixed(1) : '—';
    const c = document.createElement('div');
    c.className = 'menu-card';
    c.innerHTML=`
      <div class="card-header">
        <input class="card-name-input" value="${m.name}" oninput="updateField(${m.id},'name',this.value)">
        <div style="display:flex;align-items:center;gap:5px;">
          <span class="card-badge" style="background:${bg};color:${tc};">粗利率 ${mr.toFixed(0)}%</span>
          <button class="del-btn" onclick="deleteMenu(${m.id})">✕</button>
        </div>
      </div>
      <div class="card-inputs">
        <div class="input-group">
          <label>売値</label>
          <div class="input-row"><span>¥</span>
            <input type="number" value="${m.price}" min="0" step="10" oninput="updateField(${m.id},'price',+this.value)">
          </div>
        </div>
        <div class="input-group">
          <label>原価</label>
          <div class="input-row"><span>¥</span>
            <input type="number" value="${m.cost}" min="0" step="10" oninput="updateField(${m.id},'cost',+this.value)">
          </div>
        </div>
      </div>
      <div class="card-stats">
        <div class="stat"><div class="lbl">粗利/個</div><div class="val" style="color:${tc};">¥${fmt(mg)}</div></div>
        <div class="stat"><div class="lbl">月間売上</div><div class="val">¥${fmt(m.price*m.qty)}</div></div>
        <div class="stat"><div class="lbl">月間粗利</div><div class="val" style="color:#1E6B4A;">¥${fmt(mg*m.qty)}</div></div>
      </div>
      <div class="qty-row">
        <label>月販売数</label>
        <input type="range" min="0" max="600" step="1" value="${m.qty}"
          oninput="updateField(${m.id},'qty',+this.value);this.nextElementSibling.textContent=(+this.value)+'個（1日'+(+this.value/DAYS).toFixed(1)+'個）'">
        <span class="qty-val">${m.qty}個（1日${dq}個）</span>
      </div>`;
    grid.appendChild(c);
  });
}

function updateField(id,field,val){
  const m = menus.find(x=>x.id===id);
  if(!m)return;
  m[field] = field==='name'?val:+val;
  if(field!=='name') renderCards();
  recalc();
}
function deleteMenu(id){ menus=menus.filter(x=>x.id!==id); renderCards(); recalc(); }
function addMenu(){ menus.push({id:nextId++,name:'新メニュー',price:1000,cost:300,qty:50}); renderCards(); recalc(); }
function resetAll(){ menus=JSON.parse(JSON.stringify(DEFAULT_MENUS)); DAYS=getDays(); renderCards(); recalc(); }

function recalc(){
  DAYS = getDays();
  const fixed = getFixed();
  let tS=0,tC=0,tG=0;
  menus.forEach(m=>{ tS+=m.price*m.qty; tC+=m.cost*m.qty; tG+=(m.price-m.cost)*m.qty; });
  const gr   = tS>0 ? tG/tS*100 : 0;
  const prof = tG - fixed;
  const pr   = tS>0 ? prof/tS*100 : 0;
  const bep  = gr>0 ? fixed/(gr/100) : Infinity;
  const daily= DAYS>0 ? tS/DAYS : 0;

  document.getElementById('s-days').textContent   = DAYS.toFixed(1)+'日/月';
  document.getElementById('s-sales').textContent  = '¥'+fmt(tS);
  document.getElementById('s-cogs').textContent   = '¥'+fmt(tC);
  document.getElementById('s-gross').textContent  = '¥'+fmt(tG)+'（'+gr.toFixed(1)+'%）';
  document.getElementById('s-fixed').textContent  = '¥'+fmt(fixed);
  document.getElementById('fix-total').textContent= fmt(fixed);
  document.getElementById('s-profit').textContent = (prof>=0?'+':'')+'¥'+fmt(prof);
  document.getElementById('s-prate').textContent  = '利益率 '+pr.toFixed(1)+'%';
  document.getElementById('daily-badge').textContent = '1日売上: ¥'+fmt(daily)+'　月商: ¥'+fmt(tS)+'（'+DAYS.toFixed(1)+'日）';

  const pb = document.getElementById('profit-block');
  pb.style.background = prof>=0?'#E8F5EE':'#FFF0EF';
  pb.style.color      = prof>=0?'#1E6B4A':'#C0392B';

  document.getElementById('s-bep').textContent    = isFinite(bep)?'¥'+fmt(bep)+'/月':'—';
  document.getElementById('s-bep-sub').textContent= isFinite(bep)&&DAYS>0?'1日あたり ¥'+fmt(bep/DAYS):'—';

  const target = +document.getElementById('target-sales').value||0;
  const diff   = tS - target;
  const td     = document.getElementById('target-diff');
  td.textContent = (diff>=0?'目標比 +':'目標比 ')+fmt(diff)+'円';
  td.style.color = diff>=0?'#1E6B4A':'#C0392B';

  const table = document.getElementById('contrib-table');
  table.innerHTML = '<tr><th>メニュー</th><th style="text-align:right;">粗利</th><th style="width:70px;"></th></tr>';
  const maxG = Math.max(...menus.map(m=>(m.price-m.cost)*m.qty),1);
  [...menus].sort((a,b)=>(b.price-b.cost)*b.qty-(a.price-a.cost)*a.qty).forEach(m=>{
    const g = (m.price-m.cost)*m.qty;
    const w = Math.max(0,Math.round(g/maxG*100));
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${m.name}">${m.name}</td>
      <td style="text-align:right;font-weight:600;color:#1E6B4A;">¥${fmt(g)}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${w}%"></div></div></td>`;
    table.appendChild(tr);
  });
}

document.getElementById('target-sales').addEventListener('input', recalc);
renderCards();
recalc();
</script>
</body>
</html>
